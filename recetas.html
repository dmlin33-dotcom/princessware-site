<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recetas · Princessware</title>
<meta name="description" content="Recetas para aprovechar tu batería de acero 18/8: cocción sin aceite, al vapor y en su propio jugo."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="recetas">

<main class="pw">
  <nav class="pw-crumb"><a href="index.html">Inicio</a> <span>›</span> <span>Recetas</span></nav>
  <header class="pw-pagehead">
    <div class="pw-eyebrow">Inspiración</div>
    <h1>Recetas Princessware</h1>
    <p>Ideas para sacarle todo el jugo a tu batería de acero 18/8 —literalmente. Cocción sin aceite, al vapor y en el jugo natural de los alimentos.</p>
  </header>

  <div class="pw-recipes" id="pwRecipes"></div>
</main>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/components.js"></script>
<script src="js/auth.js"></script>
<script>
  (function () {
    const { RECIPES, icon } = window.PW;
    document.getElementById('pwRecipes').innerHTML = RECIPES.map((r) => `
      <article class="pw-recipe">
        <div class="pw-recipe-img"><img src="${r.img}" alt="${r.title}" loading="lazy"/></div>
        <div class="pw-recipe-body">
          <div class="pw-recipe-tag">${r.tag}</div>
          <h3>${r.title}</h3>
          <p>${r.desc}</p>
          <div class="pw-recipe-meta"><span>⏱ ${r.time}</span><span>${r.level}</span></div>
        </div>
      </article>`).join('');
  })();
</script>
</body>
</html>
