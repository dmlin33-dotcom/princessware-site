<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tienda · Princessware</title>
<meta name="description" content="Toda la línea Princessware en acero quirúrgico 18/8: sets completos, ollas, sartenes y cocción al vapor. Garantía de por vida."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="tienda">

<main class="pw">
  <nav class="pw-crumb"><a href="index.html">Inicio</a> <span>›</span> <span id="pwCrumbCat">Tienda</span></nav>
  <header class="pw-pagehead">
    <h1 id="pwShopTitle">Tienda</h1>
    <p id="pwShopDesc">Toda la línea en acero quirúrgico 18/8. Cocción sana, sin tóxicos y para toda la vida.</p>
  </header>

  <div class="pw-shop">
    <aside class="pw-filters" id="pwFilters">
      <h4>Filtrar</h4>
      <div class="pw-filter-group" id="pwCatFilters"></div>
      <div class="pw-filter-group" id="pwMiscFilters">
        <label class="pw-filter-opt"><input type="checkbox" id="fNuevo"/> Novedades</label>
      </div>
    </aside>

    <div class="pw-shop-main">
      <div class="pw-shop-bar">
        <button class="pw-mobile-filter" id="pwMobileFilter">Filtrar</button>
        <span class="pw-shop-count" id="pwShopCount"></span>
        <select class="pw-sort" id="pwSort">
          <option value="relevancia">Más relevantes</option>
          <option value="rating">Mejor valorados</option>
        </select>
      </div>
      <div class="pw-grid" id="pwShopGrid"></div>
    </div>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/components.js"></script>
<script src="js/auth.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
